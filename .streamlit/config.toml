# Tema: redaktionellt & varmt — inspirerat av ol.studio
# Varm gräddvit bas, klassisk serif i rubriker, skarp grotesk i data.
# Ändringar här kräver omstart av Streamlit-servern.
[theme]
base = "light"
primaryColor = "#6B7052"            # dämpad oliv — accent för knappar/flikar/reglage
backgroundColor = "#F2EDE3"         # varm gräddvit (ol.studio-ton)
secondaryBackgroundColor = "#EAE4D6"  # aningen djupare cream för paneler/sidopanel
textColor = "#433D34"               # varm mörkbrun i stället för svart
font = "Space Grotesk, sans-serif"  # data & brödtext: behåller skärpan i tabellerna
headingFont = "EB Garamond, serif"  # rubriker: klassisk serif, redaktionell känsla
headingFontWeights = [500, 500, 500, 500, 500, 500]

[[theme.fontFaces]]
family = "Space Grotesk"
url = "https://fonts.gstatic.com/s/spacegrotesk/v22/V8mDoQDjQSkFtoMM3T6r8E7mPbF4C_k3HqU.woff2"
weight = "300 700"

[[theme.fontFaces]]
family = "EB Garamond"
url = "https://fonts.gstatic.com/s/ebgaramond/v33/SlGUmQSNjdsmc35JDF1K5GR1SDk_YAPI.woff2"
weight = "400 700"

[browser]
gatherUsageStats = false
