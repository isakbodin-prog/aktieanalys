# Tema: ljust & skandinaviskt rent
# Ändringar här kräver omstart av Streamlit-servern.
[theme]
base = "light"
primaryColor = "#0E7A5F"            # lugn grönblå accent (knappar, flikmarkering, reglage)
backgroundColor = "#FFFFFF"         # ren vit bas
secondaryBackgroundColor = "#F4F6F5"  # mjuk ljusgrå för sidopanel och paneler
textColor = "#20303B"               # djup blågrå — mjukare än svart
font = "Space Grotesk, sans-serif"  # brödtext: modernt typsnitt med tech-karaktär
headingFont = "Bricolage Grotesque, sans-serif"  # rubriker: karaktärsfull grotesk
headingFontWeights = [500, 500, 500, 500, 500, 500]  # tunnare rubriker (standard är fetstil)

[[theme.fontFaces]]
family = "Space Grotesk"
url = "https://fonts.gstatic.com/s/spacegrotesk/v22/V8mDoQDjQSkFtoMM3T6r8E7mPbF4C_k3HqU.woff2"
weight = "300 700"

[[theme.fontFaces]]
family = "Bricolage Grotesque"
url = "https://fonts.gstatic.com/s/bricolagegrotesque/v9/3y9K6as8bTXq_nANBjzKo3IeZx8z6up5BeSl9D4dj_x9PpZBMlGIInHWVyNJ.woff2"
weight = "300 800"

[browser]
gatherUsageStats = false
